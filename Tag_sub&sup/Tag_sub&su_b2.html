<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học thẻ sub và sup trên W3School !</title>
    <!-- Hầu hết các trình duyệt sẽ hiển thị các phần tử sub và sup với
     các giá trị mặc định sau :-->
    <style>
      sub {
        vertical-align: sub;
        font-size: small;
      }
      sup {
        vertical-align: super;
        font-size: small;
      }
    </style>
  </head>
  <body>
    <h1>Thẻ sub và sup ! Bài 2 !</h1>
    <p>Ví dụ :</p>
    <p>Văn bản chứa chỉ số dưới <sub>subscript</sub></p>
    <p>Văn bản chứa chỉ số trên <sup>superscript</sup></p>
  </body>
</html>
