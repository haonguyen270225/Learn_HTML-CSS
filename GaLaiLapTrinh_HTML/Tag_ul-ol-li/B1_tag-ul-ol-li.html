<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học thẻ ul-ol và li !</title>
  </head>
  <body>
    <p>ul - unodered list là danh sách không có thứ tự !</p>
    <p>ol - ordered list là danh sách có thứ tự !</p>
    <p>li - list item là thẻ con trực tiếp của ul và ol !</p>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ul>

    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ol>
  </body>
</html>
