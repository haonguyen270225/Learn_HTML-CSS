<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Các kiểu type trong phần tử input !</title>
  </head>
  <body>
    <h1>Hiển thị điều khiển chọn tháng !</h1>
    <form action="" method="get">
      <label for="bdaymonth">Ngày sinh (tháng và năm) : </label>
      <input type="month" id="bdaymonth" name="bdaymonth" />
    </form>
  </body>
</html>
