<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Các kiêu type của thẻ input !</title>
  </head>
  <body>
    <p>
      Định nghĩa một trường nhập số , bạn có thể giới hạn những giá trị được
      chấp nhận !
    </p>
    <p><b>Ví dụ :</b></p>
    <form action="" method="get">
      <label for="quantity"> Chọn giá trị số (từ 1 đến 10) :</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="1"
        max="10"
        value="1"
        //step="2"
      />
      <input type="submit" value="Gửi !" />
    </form>
  </body>
</html>
