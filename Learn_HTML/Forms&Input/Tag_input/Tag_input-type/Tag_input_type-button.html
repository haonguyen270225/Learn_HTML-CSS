<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Các loại type trong phần tử input !</title>
  </head>
  <body>
    <h1>Hiển thị nút nhấn button !</h1>
    <p>Nút nhấn bên dưới sẽ kích hoạt hàm JavaScript khi nhấn !</p>
    <form action="" method="get">
      <input type="button" value="Click me !" onclick="msg()" />
    </form>
    <script>
      function msg() {
        alert("Hello world !");
      }
    </script>
  </body>
</html>
