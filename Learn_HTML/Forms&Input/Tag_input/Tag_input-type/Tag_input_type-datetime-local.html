<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Các kiểu type của phần tử input !</title>
  </head>
  <body>
    <h1>Hiển thị ô chọn date - time !</h1>
    <form action="" method="get">
      <label for="birthdaytime">Ngày sinh (date - time) : </label>
      <input type="datetime-local" name="birthdaytime" id="birthdaytime" />
      <br />
      <br />
      <input type="submit" value="Gửi !" />
    </form>
  </body>
</html>
