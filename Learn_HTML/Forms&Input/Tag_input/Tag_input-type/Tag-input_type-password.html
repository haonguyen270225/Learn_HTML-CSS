<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Các loại type của thẻ input !</title>
</head>
<body>
    <p>- Định nghĩa một trường nhập mật khẩu (các ký tự được che giấu !) <br>
    - Bất kỳ biểu mẫu nào chứa thông tin nhạy cảm như mật khẩu đều phải gửi qua HTTPS. <br>
    - Luôn thêm thẻ label để đảm bảo khả năng truy cập.</p>
    <p><b>Ví dụ : </b></p>
<form action="" method="get">
    <label for="email">Email : </label>
    <input type="email" id = "email" name = "email"> <br> <br>
    <label for="passwd">Mật khẩu :</label>
    <input type="password" id = "passwd" name = "passwd"> <br> <br>
    <input type="submit" value="Gửi !">
</form>
</body>
</html>
