<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuộc tính enctype của form !</title>
  </head>
  <body>
    <p>
      Thuộc tính enctype của form chỉ định cách dữ liệu dữ liệu biểu mẫu sẽ được
      chuẩn hóa khi gửi đến máy chủ. <br />
      <b>Lưu ý :</b> Thuộc tính enctype chỉ có thể được sử dụng khi method =
      "post".
    </p>
    <p>Ví dụ :</p>
    <br />
    <form action="" method="post" enctype="multipart/form-data">
      <label for="fname">Tên :</label>
      <input type="text" name="fname" id="fname" /> <br /><br />
      <label for="lname">Họ :</label>
      <input type="text" name="lname" id="lname" /> <br />
      <br />
      <input type="submit" value="Gửi !" />
    </form>
  </body>
</html>
