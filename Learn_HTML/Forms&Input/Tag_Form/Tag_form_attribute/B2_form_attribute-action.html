<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuộc tính action của form !</title>
  </head>
  <body>
    <p>
      Thuộc tính action chỉ định nơi gửi dữ liệu biểu mẫu khi biểu mẫu được gửi
      đi !
    </p>
    <form action="/action_page.php">
      <label for="ten">Tên :</label>
      <input type="text" id="ten" name="ten" /> <br />
      <br />
      <label for="ho">Họ :</label>
      <input type="text" id="ho" name="ho" /> <br />
      <br />
      <input type="submit" value="Gửi !" />
    </form>
    <p>
      Nhấp vào nút "Gửi !" thì dữ liệu biểu mẫu sẽ được gửi đến một trang trên
      máy chủ có tên là "action_page.php" !
    </p>
  </body>
</html>
