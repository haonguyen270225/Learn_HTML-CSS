<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuộc tính method của form !</title>
  </head>
  <body>
    <p>
      - Thuộc tính method này quy định cách gửi dữ liệu biểu mẫu (dữ liệu được gữi
      đến trang được chỉ định bằng thuộc tính action) <br />
      - Dữ liệu biểu mẫu sẽ được gửi dưới dạng URL (với method = "get" ) hoặc dưới dạng  giao dịch (với method = "post");
    </p>
    <p><b>Ví dụ : </b></p>
    <form action="" method="get">
        <label for="fname">Tên :</label>
        <input type="text" id="fname" name = "fanem"> <br> <br>
        <label for="lname">Họ :</label>
        <input type="text" id = "lname" name = "lname"> <br> <br>
        <input type="submit" value = "Gửi !">
    </form>
  </body>
</html>
