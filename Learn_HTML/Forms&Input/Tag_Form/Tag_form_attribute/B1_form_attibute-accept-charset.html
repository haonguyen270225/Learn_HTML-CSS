<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuộc tính accept-charset trên form !</title>
</head>
<body>
    <p>Thuộc tính accept-charset chỉ định các mã hóa ký tự sẽ được sử dụng khi gửi biểu mẫu ! </p>
    <p>Ví dụ :</p>
    <form action="/action_page.php" accept-charset="UTF-8">
        <label for="fname"> Tên :</label>
        <input type="text" id="fanme" name = "fname"> <br> <br>
        <input type="submit" value = "Gửi !">
    </form>
</body>
</html>
