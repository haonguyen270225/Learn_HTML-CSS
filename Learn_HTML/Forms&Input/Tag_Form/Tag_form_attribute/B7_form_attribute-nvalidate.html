<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuộc tính novalidate của form !</title>
  </head>
  <body>
    <p>
      - Thuộc tính novalidate là một thuộc tính kiểu boolean . <br />
      - Khi thêm vào, nó chỉ định rằng dữ liệu của biểu mẫu (input) sẽ không
      được kiểm tra (validate).
    </p>
    <p><b>Ví dụ : </b></p>
    <form action="" novalidate>
      <label for="fname">Tên : </label>
      <input type="text" id="fname" name="fname" /> <br />
      <br />
      <label for="lname">Họ :</label>
      <input type="text" id="lname" name="lname" /> <br />
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
