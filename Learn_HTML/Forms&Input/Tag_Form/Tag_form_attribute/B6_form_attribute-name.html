<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuộc tính name của form !</title>
  </head>
  <body>
    <p>- Thuộc tính name chỉ định tên của một biểu mẫu form ! <br /> 
        - Thuộc tính name được sử dụng để tham chiếu đến các phần tử trong javaScript hoặc để tham chiếu dữ liệu biểu mẫu sau khi biểu mẫu được gửi đi.
    </p>

    <p><b>Ví dụ :</b></p>
    <form action="" name = "myForm" method = "get">
        <label for="fname">Tên : </label>
        <input type="text" id = "fname" name = "fname">
        <label for="lname">Họ :</label>
        <input type="text" id="lname" name = "lname">
        <input type="submit">
    </form>
  </body>
</html>
