<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học thẻ kbd trên W3School !</title>
    <style>
      kbd {
        border-radius: 2px;
        padding: 2px;
        border: 1px solid rgb(163, 29, 29);
      }
    </style>
  </head>
  <body>
    <h1>Bài 2. Học thẻ kbd !</h1>
    <p>Ví dụ sử dụng CSS để định dạng phần từ kbd !</p>
    <p>
      Nhấn <kbd>Ctrl</kbd> + <kbd>C</kbd> để sao chép đoạn văn bản (Windows)
    </p>
    <p>Nhấn <kbd>Cmd</kbd> + <kbd>C</kbd> để sao chép đoạn văn bản (Mac OS)</p>
  </body>
</html>
