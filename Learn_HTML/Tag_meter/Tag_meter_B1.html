<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học thẻ meter trên W3School !</title>
  </head>
  <body>
    <h1>Phần tử meter. Bài 1 !</h1>
    <p>
      Phần tử meter dùng để biểu thị một giá trị dạng số trong một phạm vi nhất
      định (giống như đồng hồ đo!)
    </p>
    <p>Ví dụ :</p>
    <label for="disk_c">Dung lượng ổ đĩa đã dùng trên ổ C : </label>
    <meter id="disk_c" value="2" min="0" max="10">2 out of 10</meter> <br />
    <label for="disk_d">Dung lượng ổ đĩa đã dùng trên ổ D : </label>
    <meter id="disk_d" value="0.6">60%</meter>
  </body>
</html>
