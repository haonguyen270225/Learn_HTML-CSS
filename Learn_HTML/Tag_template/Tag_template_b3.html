<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học thẻ template trên W3School !</title>
  </head>
  <body>
    <h1>Thẻ tamplate ! Bài 3 !</h1>
    <p>
      Ví dụ : Kiểm tra xem trình duyệt của bạn có hỗ trợ template hay không !
    </p>
    <script>
      if (document.createElement("template").content) {
        document.write("Trình duyệt của bạn có hỗ trợ phần tử template !");
      } else {
        document.write("Trình duyệt của bạn không hỗ trợ phần tử template !");
      }
    </script>
  </body>
</html>
